<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>SlowSim dream render</title>
  <script type="importmap">
    { "imports": { "three": "../vendor/three.module.js" } }
  </script>
</head>
<body>
  <canvas id="view" width="256" height="256"></canvas>
  <script type="module">
    // Render a supplied pose sequence through the REAL renderer. We keep the sim
    // as the world/road source (correct seed) but overwrite sim.car with each
    // dreamed (or true) pose before rendering — so the scenery is real and only
    // the car's trajectory is what we drive. This is Option A: watch the state
    // model's dream as a fully-rendered drive.
    import { SlowSim } from "../core/index.js";
    import { SimRenderer } from "../render/renderer.js";

    // ONE renderer for the whole run — reused across sequences. Creating a
    // second WebGLRenderer loses the first context (ReadPixels GPU stall ->
    // CONTEXT_LOST), and the second init then fails, so we cache it.
    let _renderer = null;
    function getRenderer(size) {
      if (!_renderer) {
        _renderer = new SimRenderer(document.getElementById("view"), { dataSize: size });
        _renderer.setDisplaySize(size, size);
      }
      return _renderer;
    }

    window.renderPoses = async (seed, poses, size) => {
      const sim = new SlowSim({ seed });
      const renderer = getRenderer(size);

      const frames = [];
      for (const pose of poses) {
        // Overwrite the car pose; sim.state is a getter over sim.car, so render()
        // picks these up. Road/atmosphere stay from the seed.
        sim.car.x = pose.x;
        sim.car.z = pose.z;
        sim.car.heading = pose.heading;
        sim.car.speed = pose.speed;
        // carD (distance along road) drives some scenery LOD; approximate from
        // the nearest road point so terrain/veg stream correctly around the car.
        const near = sim.road.nearest(pose.x, pose.z, sim.carD);
        sim.carD = near.d;
        renderer.render(sim, 0);
        frames.push(toBase64(renderer.capture(size)));
        // Yield to the event loop between captures so the sustained ReadPixels
        // readbacks don't stall the GPU into a lost context.
        if (frames.length % 16 === 0) await new Promise((r) => setTimeout(r, 0));
      }
      return frames;
    };

    // Base64 in chunks — String.fromCharCode(...buf) spreads the whole array
    // into args and overflows the call stack for real frame sizes (256^2*4).
    function toBase64(bytes) {
      let s = "";
      const CH = 0x8000;
      for (let i = 0; i < bytes.length; i += CH) {
        s += String.fromCharCode.apply(null, bytes.subarray(i, i + CH));
      }
      return btoa(s);
    }

    window.__ready = true;
  </script>
</body>
</html>
