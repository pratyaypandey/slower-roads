<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>SlowSim capture</title>
  <!-- Same importmap as the demo so the vendored three resolves. -->
  <script type="importmap">
    { "imports": { "three": "../vendor/three.module.js" } }
  </script>
</head>
<body>
  <canvas id="view" width="512" height="512"></canvas>
  <script type="module">
    // Headless capture driver: Playwright calls window.captureDrive(seed, steps,
    // size) and gets back the per-step actions + states + base64 RGBA frames.
    // Runs the REAL WebGL renderer (needs a GPU/browser), unlike generate.mjs.
    import { SlowSim } from "../core/index.js";
    import { SimRenderer } from "../render/renderer.js";

    window.captureDrive = async (seed, steps, size) => {
      const canvas = document.getElementById("view");
      let contextLost = false;
      // Abort loudly on context loss — post-loss frames render blank/gray.
      canvas.addEventListener("webglcontextlost", () => { contextLost = true; });
      const sim = new SlowSim({ seed });
      const renderer = new SimRenderer(canvas, { dataSize: size });
      renderer.setDisplaySize(512, 512);

      renderer.stepCamera(sim, sim.dt);  // seed the chase camera before frame 0
      const samples = [];
      for (let i = 0; i < steps; i++) {
        const action = sim.autopilotAction();
        if (contextLost) throw new Error("WebGL context lost mid-capture — frames would be blank. Use CPU rendering (default).");
        renderer.stepCamera(sim, sim.dt);     // advance the chase cam to follow the car
        renderer.render(sim, 0);              // draw current state
        const rgba = renderer.capture(size);  // Uint8Array size*size*4
        samples.push({
          action,
          state: sim.state,
          skeleton: sim.skeleton(),
          labels: sim.frameLabels(),
          // base64 so it survives the Playwright JS->Node boundary as JSON.
          rgba: toBase64(rgba),
        });
        sim.step(action);
      }
      // Final state (no action) to close the last transition.
      renderer.render(sim, 0);
      samples.push({
        action: null, state: sim.state, skeleton: sim.skeleton(),
        labels: sim.frameLabels(), rgba: toBase64(renderer.capture(size)),
      });
      return { seed, steps, dt: sim.dt, size, samples };
    };

    // Base64 in chunks — String.fromCharCode(...buf) overflows the call stack
    // for real frame sizes (a spread of size^2*4 elements into args).
    function toBase64(bytes) {
      let s = "";
      const CH = 0x8000;
      for (let i = 0; i < bytes.length; i += CH) {
        s += String.fromCharCode.apply(null, bytes.subarray(i, i + CH));
      }
      return btoa(s);
    }

    window.__ready = true;
  </script>
</body>
</html>
